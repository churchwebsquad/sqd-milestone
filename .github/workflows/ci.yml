name: CI

# Runs on every PR into main (and on pushes to main as a backstop). All jobs
# must pass before a PR can merge — wire them into branch protection as
# required status checks (Settings → Branches → main).
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  schema-guard:
    name: schema-guard (no new tables)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history so the merge-base diff in schema-guard.mjs works.
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: node scripts/schema-guard.mjs

  typecheck:
    name: typecheck (ratchet)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      # Ratchet — fails only on NEW errors above scripts/typecheck-baseline.json.
      # Pre-existing errors are grandfathered. The floor only moves DOWN, by
      # running `node scripts/typecheck-ratchet.mjs --update` locally + committing
      # the new baseline. See scripts/typecheck-ratchet.mjs for the full mechanism.
      - run: node scripts/typecheck-ratchet.mjs

  lint:
    name: lint (ratchet)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      # Same pattern as typecheck. Existing lint errors grandfathered;
      # new errors block.
      - run: node scripts/lint-ratchet.mjs

  build:
    name: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
        # Vite reads VITE_* env at build via import.meta.env; they're injected
        # at deploy time by Vercel. If the build ever starts REQUIRING one at
        # build-time, add it to repo Actions secrets and surface it here.
